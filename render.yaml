services:
  - type: web
    name: orator
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx tsx script/migrate.ts && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: orator-db
          property: connectionString

databases:
  - name: orator-db
    databaseName: orator
    plan: free
    region: oregon
